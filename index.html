<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#1B2A4A;--blue:#2E5F8A;--steel:#6B7B8D;--light:#E8ECF0;--txt:#1A1A2E;--ok:#0077BB;--warn:#E69F00;--alert:#CC3311;--bg:#F4F6F9;--gold:#D4A017;--green:#0A8754;--white:#FFF}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--txt);-webkit-tap-highlight-color:transparent}
.ctn{max-width:540px;margin:0 auto;padding:20px 16px;min-height:100vh}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .3s ease}
.hbg{background:linear-gradient(160deg,var(--navy),var(--blue) 50%,#4A90C4);min-height:100vh}
.rbg{background:linear-gradient(160deg,var(--navy),var(--blue));min-height:100vh}
</style>
<style>
.dbtn{display:flex;align-items:center;gap:14px;padding:16px 20px;width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:14px;color:#fff;transition:all .2s;margin-bottom:10px;text-align:left}
.dbtn:hover{background:rgba(255,255,255,.22);transform:translateY(-2px)}
.lbtn{display:flex;align-items:center;gap:14px;padding:18px 20px;width:100%;background:linear-gradient(135deg,rgba(212,160,23,.25),rgba(212,160,23,.1));border:1px solid rgba(212,160,23,.4);border-radius:14px;color:var(--gold);transition:all .2s;margin:8px 0 20px;text-align:left}
.lbtn:hover{background:linear-gradient(135deg,rgba(212,160,23,.4),rgba(212,160,23,.2));transform:translateY(-2px)}
.badge{border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.pbar{height:5px;background:var(--light);border-radius:3px;margin-bottom:24px}
.pfill{height:5px;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--ok));transition:width .4s}
.tag{border-radius:20px;padding:4px 14px;font-size:12px;font-weight:600;color:#fff;display:inline-block;margin-right:6px;margin-bottom:12px}
</style>
</head>

var LS=[
{ti:"C'est quoi une fonction ?",ic:"🤔",su:"La machine à transformer",h:'<p class="lp">Imagine une <b>machine</b> : tu mets un nombre dedans, elle te donne un résultat. C\'est ça, une fonction.</p><div class="machine-box" style="display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;background:var(--light);border-radius:12px;padding:16px;margin-bottom:16px"><div style="background:var(--ok);color:#fff;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:600">Tu mets : <b>3</b></div><div style="color:var(--navy);font-size:13px;font-weight:600">→ f(x) = 2x+1 →</div><div style="background:var(--green);color:#fff;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:600">Tu obtiens : <b>7</b></div></div><p class="lp">Le <b>3</b> = l\'<span class="hl">entrée</span> (antécédent).<br>Le <b>7</b> = la <span class="hl">sortie</span> (image).</p><p class="lp">Règle : <b>pour chaque entrée, une seule sortie</b>.</p><div class="key-box"><b>📌 Vocabulaire :</b><br>• f(3)=7 → « l\'image de 3 par f est 7 »<br>• 3 est un antécédent de 7<br>• f est le nom de la fonction</div>'},
{ti:"À quoi ça sert ?",ic:"🌍",su:"Les fonctions sont partout",h:'<p class="lp">Elles décrivent <b>comment une chose dépend d\'une autre</b>.</p><div class="ex-box"><div class="ex-title">📱 Forfait téléphone</div><p class="ex-p">10€/mois + 0,05€/SMS.</p><div class="formula-box">f(x) = 0,05x + 10</div><p class="ex-p">200 SMS → f(200) = 0,05×200+10 = <b>20€</b></p></div><div class="ex-box"><div class="ex-title">🚗 Distance</div><p class="ex-p">Voiture à 60 km/h, route Mamoudzou–Sada.</p><div class="formula-box">d(t) = 60t</div><p class="ex-p">0,5h → <b>30 km</b></p></div><div class="ex-box"><div class="ex-title">🏊 Piscine</div><p class="ex-p">5000L, remplissage 250L/h.</p><div class="formula-box">V(t) = 250t</div><p class="ex-p">Pleine quand ? 250t=5000 → <b>20h</b></p></div><div class="key-box"><b>💡</b> Une fonction = un outil pour <b>prévoir</b> et <b>calculer</b>.</div>'},
{ti:"Linéaire vs Affine",ic:"⚖️",su:"Les deux types du brevet",h:'<p class="lp">Deux types principaux :</p><div style="display:flex;gap:10px;margin-bottom:20px"><div style="flex:1;border:2px solid var(--ok);border-radius:12px;padding:14px"><div style="color:var(--ok);font-weight:700;font-size:15px;margin-bottom:8px">Linéaire</div><div class="formula-box">f(x) = ax</div><p class="ex-p">• Passe par O(0;0)<br>• = proportionnalité<br>• Ex: prix au kilo</p><div style="background:#E6F4FF;border-radius:8px;padding:10px;font-size:13px;margin-top:8px">3 mangues → 6€<br><b>f(x) = 2x</b></div></div><div style="flex:1;border:2px solid var(--warn);border-radius:12px;padding:14px"><div style="color:var(--warn);font-weight:700;font-size:15px;margin-bottom:8px">Affine</div><div class="formula-box">f(x) = ax + b</div><p class="ex-p">• Ne passe PAS par O<br>• Part fixe + variable<br>• Ex: taxi</p><div style="background:#FFF8E6;border-radius:8px;padding:10px;font-size:13px;margin-top:8px">3€ base + 1,20€/km<br><b>f(x) = 1,2x+3</b></div></div></div><div class="key-box"><b>🔑</b> b=0 → linéaire | b≠0 → affine<br><b>a</b> = pente | <b>b</b> = ordonnée à l\'origine</div>'},
{ti:"Lire un graphique",ic:"📊",su:"Le graphique raconte une histoire",h:'<p class="lp">Un graphique = une <b>photo de la relation</b> entre 2 grandeurs.</p><div class="ex-box"><div class="ex-title">🔍 Trouver une image</div><p class="ex-p">f(3) : pars de x=3, monte à la courbe, lis y.</p><div style="padding:10px;background:var(--light);border-radius:8px;font-family:monospace;font-size:14px;text-align:center;margin-bottom:12px">x=3 → ↑ courbe → y=? → f(3)</div></div><div class="ex-box"><div class="ex-title">🔍 Trouver un antécédent</div><p class="ex-p">f(x)=5 : pars de y=5, va → à la courbe, lis x.</p><div style="padding:10px;background:var(--light);border-radius:8px;font-family:monospace;font-size:14px;text-align:center;margin-bottom:12px">y=5 → → courbe → x=?</div></div><div class="ex-box"><div class="ex-title">📈 Croissante / Décroissante</div><p class="ex-p">Monte → <span style="color:var(--green);font-weight:700">croissante</span><br>Descend → <span style="color:var(--alert);font-weight:700">décroissante</span></p></div><div class="key-box"><b>⚠️ Piège brevet :</b> « antécédent de 4 » ≠ f(4) ! C\'est le x tel que f(x)=4. Pars de l\'axe <b>vertical</b>.</div>'},
{ti:"Le coefficient directeur",ic:"📐",su:"La pente = vitesse du changement",h:'<p class="lp">Le coeff. <b>a</b> mesure la vitesse de changement = la <b>pente</b>.</p><div style="display:flex;gap:10px;margin-bottom:20px"><div style="flex:1;background:#E6F4EA;border-radius:12px;padding:14px;text-align:center"><div style="font-size:32px">↗️</div><div style="font-weight:700;color:var(--green)">a &gt; 0</div><div style="font-size:12px;margin-top:4px">Monte<br>Croissante</div></div><div style="flex:1;background:#FDE8E8;border-radius:12px;padding:14px;text-align:center"><div style="font-size:32px">↘️</div><div style="font-weight:700;color:var(--alert)">a &lt; 0</div><div style="font-size:12px;margin-top:4px">Descend<br>Décroissante</div></div><div style="flex:1;background:var(--light);border-radius:12px;padding:14px;text-align:center"><div style="font-size:32px">➡️</div><div style="font-weight:700;color:var(--steel)">a = 0</div><div style="font-size:12px;margin-top:4px">Horizontal<br>Constante</div></div></div><div class="ex-box"><div class="ex-title">🧮 Calcul</div><div class="formula-box">a = (y₂−y₁) / (x₂−x₁)</div><p class="ex-p">A(1;3), B(4;9) → a = 6/3 = <b>2</b><br>= quand x↑1, y↑2</p></div><div class="ex-box"><div class="ex-title">🌊 Concret</div><p class="ex-p">Réservoir −15L/min → a = <b>−15</b><br>Le − = ça diminue. Le 15 = 15L/min.</p></div><div class="key-box"><b>💡</b> C\'est la pente d\'une route. Plus |a| est grand, plus c\'est raide. Le signe = monte (+) ou descend (−).</div>'},
{ti:"Résoudre un problème",ic:"🎯",su:"La méthode pas à pas",h:'<p class="lp">Au brevet : situation concrète → modéliser.</p><div style="background:#fff;border-radius:12px;padding:16px;border:2px solid var(--blue);margin-bottom:20px"><div style="display:flex;flex-direction:column;gap:14px"><div style="display:flex;gap:12px;align-items:flex-start"><span style="width:30px;height:30px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0">1</span><div><div style="font-weight:700;font-size:14px;color:var(--navy)">Identifier les grandeurs</div><div style="font-size:13px;color:var(--steel)">Variable x ? Résultat f(x) ?</div></div></div><div style="display:flex;gap:12px;align-items:flex-start"><span style="width:30px;height:30px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0">2</span><div><div style="font-weight:700;font-size:14px;color:var(--navy)">Trouver la relation</div><div style="font-size:13px;color:var(--steel)">Part fixe ? Variable ? Proportionnel ?</div></div></div><div style="display:flex;gap:12px;align-items:flex-start"><span style="width:30px;height:30px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0">3</span><div><div style="font-weight:700;font-size:14px;color:var(--navy)">Écrire f(x) = ax + b</div><div style="font-size:13px;color:var(--steel)">Calculer a et b.</div></div></div><div style="display:flex;gap:12px;align-items:flex-start"><span style="width:30px;height:30px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0">4</span><div><div style="font-weight:700;font-size:14px;color:var(--navy)">Répondre</div><div style="font-size:13px;color:var(--steel)">Image → remplacer x. Antécédent → résoudre.</div></div></div></div></div><div class="ex-box"><div class="ex-title">✍️ Exercice type</div><p class="ex-p">Taxi Mamoudzou : 2€ + 0,80€/km.</p><p class="ex-p"><b>1.</b> x=km, f(x)=prix<br><b>2.</b> Fixe=2, variable=0,80/km<br><b>3.</b> f(x)=0,8x+2<br><b>4.</b> 15km → f(15)=0,8×15+2=<b>14€</b><br>Budget 10€ → 0,8x+2=10 → x=<b>10km</b></p></div><div class="key-box"><b>🏁 Tu es prête !</b> Entraîne-toi sur les exercices Fonctions !</div>'}
];
